name: AfriLION CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          if [ -f tokenizer/requirements.txt ]; then pip install -r tokenizer/requirements.txt; fi
          if [ -f data/requirements.txt ]; then pip install -r data/requirements.txt; fi
          
      - name: Lint with ruff
        run: |
          # stop the build if there are Python syntax errors or undefined names
          ruff check .
          
      - name: Run smoke tests
        run: |
          # Run small smoke tests to ensure logic hasn't broken
          # We skip actual TPU training or large dataset audits in CI
          pytest eval/afriberta_smoke_test.py
          
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check Blog Post & Action Plan integrity
        run: |
          test -f docs/announcing-afrilion.md
          test -f docs/phase0-action-plan.md
          echo "Documentation files are present."
